apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - pvc.yaml

nameSuffix: -trial

labels:
  - pairs:
      app.kubernetes.io/environment: trial

secretGenerator:
  - name: evidra-gitops-secrets
    envs:
      - secrets.env

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
      name: evidra-gitops
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: add
        path: /spec/template/spec/serviceAccountName
        value: evidra-gitops
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: evidra-gitops-data
          persistentVolumeClaim:
            claimName: evidra-gitops-data
  - target:
      kind: ConfigMap
      name: evidra-gitops-config
    patch: |-
      - op: replace
        path: /data/EVIDRA_ARGO_COLLECTOR_ENABLED
        value: "false"
      - op: add
        path: /data/EVIDRA_DB_SSLMODE
        value: "require"

images:
  - name: evidra-gitops
    newName: evidra-gitops
    newTag: trial
